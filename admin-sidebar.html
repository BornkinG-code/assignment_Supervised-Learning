<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Admin Sidebar</title>
  <link rel="stylesheet" href="admin-sidebar.css" />
</head>
<body>
  <div class="admin-shell" id="adminShell">
    <aside class="sidebar" id="sidebar" aria-label="Admin navigation">
      <div class="sidebar__header">
        <button class="icon-btn sidebar__close-mobile" id="closeSidebar" aria-label="Close navigation">
          ✕
        </button>
        <a href="#" class="brand" aria-label="Dashboard home">
          <span class="brand__logo">◆</span>
          <span class="brand__text">Nova Admin</span>
        </a>
      </div>

      <nav class="sidebar__nav" aria-label="Sidebar">
        <a href="#" class="nav-item is-active" data-label="Dashboard">
          <span class="nav-item__icon">🏠</span>
          <span class="nav-item__label">Dashboard</span>
        </a>
        <a href="#" class="nav-item" data-label="Analytics">
          <span class="nav-item__icon">📈</span>
          <span class="nav-item__label">Analytics</span>
        </a>
        <a href="#" class="nav-item" data-label="Orders">
          <span class="nav-item__icon">🛒</span>
          <span class="nav-item__label">Orders</span>
        </a>
        <a href="#" class="nav-item" data-label="Customers">
          <span class="nav-item__icon">👥</span>
          <span class="nav-item__label">Customers</span>
        </a>
        <a href="#" class="nav-item" data-label="Settings">
          <span class="nav-item__icon">⚙️</span>
          <span class="nav-item__label">Settings</span>
        </a>
      </nav>

      <div class="sidebar__footer">
        <button class="icon-btn collapse-btn" id="desktopToggle" aria-label="Collapse sidebar" aria-expanded="true">
          <span class="collapse-btn__icon">⇤</span>
          <span class="collapse-btn__label">Collapse</span>
        </button>
      </div>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay" hidden></div>

    <main class="content" id="contentArea">
      <header class="content__topbar">
        <button class="icon-btn mobile-menu-btn" id="mobileToggle" aria-label="Open navigation">☰</button>
        <h1 class="content__title">Admin Overview</h1>
      </header>

      <section class="panel-grid">
        <article class="panel">Revenue panel</article>
        <article class="panel">Active users panel</article>
        <article class="panel">Conversion panel</article>
      </section>
    </main>
  </div>

  <script src="admin-sidebar.js"></script>
</body>
</html>
